version: 2
updates:
  # Keep npm dependencies up to date with weekly security patches
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Batch all non-major dev tool updates into a single PR
      dev-tools:
        patterns:
          - "typescript*"
          - "eslint*"
          - "@typescript-eslint*"
          - "@eslint*"
          - "vitest*"
          - "@vitest*"
          - "vite*"
          - "@vitejs*"
          - "@types/*"
    ignore:
      # Let major LLM SDK bumps be reviewed manually — their APIs can break
      - dependency-name: "@anthropic-ai/sdk"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@google/genai"
        update-types: ["version-update:semver-major"]
      - dependency-name: "openai"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions pinned-SHA actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
