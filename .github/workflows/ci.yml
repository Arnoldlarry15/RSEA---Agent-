name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Lint (type-check)
        run: npm run lint

      - name: Lint (ESLint — TypeScript rules)
        run: npm run lint:eslint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          LLM_PROVIDER: none

      - name: Build server (TypeScript → CommonJS)
        run: npm run build:server

      - name: Build frontend (Vite)
        run: npx vite build

  container-scan:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only scan on push to main / PRs targeting main to avoid rate-limit noise
    # on every feature branch.  Remove the `if` condition to scan all branches.
    if: github.event_name == 'push' || github.base_ref == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build Docker image
        run: docker build -t rsea-agent:ci .

      - name: Scan image with Trivy (CRITICAL + HIGH vulnerabilities)
        uses: aquasecurity/trivy-action@76071ef0d7ec797419534a183b498b4d6366cf37 # v0.31.0
        with:
          image-ref: "rsea-agent:ci"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

