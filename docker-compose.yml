services:
  rsea-agent:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Required in production — all authenticated endpoints reject requests without this
      - API_SECRET=${API_SECRET}
      # LLM provider selection (gemini | openai | anthropic | grok | ollama)
      - LLM_PROVIDER=${LLM_PROVIDER:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      # Optional: comma-separated list of allowed outbound hostnames for api_fetch
      - ALLOWED_FETCH_HOSTS=${ALLOWED_FETCH_HOSTS:-}
      # Optional: comma-separated allowlist of commands for system_command executor
      - ALLOWED_COMMANDS=${ALLOWED_COMMANDS:-}
    volumes:
      - rsea-data:/app/data
    restart: unless-stopped

volumes:
  rsea-data:
